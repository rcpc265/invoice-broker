name: Create Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - '.gitignore'

jobs:
  release:
    name: Generate Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 8.0.x

      - name: Setup Node.js (for semantic-release)
        uses: actions/setup-node@v3
        with:
          node-version: 'lts/*'

      - name: Build Windows x64 Binary
        run: dotnet publish src/InvoiceBroker.Api/InvoiceBroker.Api.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o out/windows

      - name: Build Linux x64 Binary
        run: dotnet publish src/InvoiceBroker.Api/InvoiceBroker.Api.csproj -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=true -o out/linux

      - name: Build macOS x64 Binary
        run: dotnet publish src/InvoiceBroker.Api/InvoiceBroker.Api.csproj -c Release -r osx-x64 --self-contained true -p:PublishSingleFile=true -o out/macos

      - name: Generate Auto-Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm install -g semantic-release @semantic-release/git @semantic-release/changelog
          npx semantic-release
